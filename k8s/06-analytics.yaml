apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: study-hours
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: 772161510099.dkr.ecr.us-west-2.amazonaws.com/analytics-service:latest
          env:
            - name: AUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: study-hours-config
                  key: AUTH_URL
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: study-hours-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: study-hours-config
                  key: MYSQL_PORT
            - name: MYSQL_DB
              valueFrom:
                secretKeyRef:
                  name: study-hours-secrets
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: study-hours-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: study-hours-secrets
                  key: MYSQL_PASSWORD
            - name: MONGO_URL
              valueFrom:
                configMapKeyRef:
                  name: study-hours-config
                  key: MONGO_URL
            - name: MONGO_DB
              valueFrom:
                configMapKeyRef:
                  name: study-hours-config
                  key: MONGO_DB
            - name: RUN_EVERY_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: study-hours-config
                  key: RUN_EVERY_SECONDS
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
