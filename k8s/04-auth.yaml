apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: study-hours
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 772161510099.dkr.ecr.us-west-2.amazonaws.com/auth-service:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: study-hours-config
                  key: PORT_AUTH
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: study-hours-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: study-hours
spec:
  selector:
    app: auth-service
  ports:
    - port: 3000
      targetPort: 3000
