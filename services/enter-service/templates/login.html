<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Study Tracker - Login</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="card">
    <h1>Enter Data</h1>
    <p>Log in to add your study hours.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="messages">
          {% for category, msg in messages %}
            <div class="msg {{category}}">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
      <label>Username</label>
      <input name="username" placeholder="demo" required />

      <label>Password</label>
      <input type="password" name="password" placeholder="pass" required />

      <button type="submit">Login</button>
    </form>

    
  </div>
</body>
</html>
